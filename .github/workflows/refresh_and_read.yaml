name: Cookie Refresh + Daily Auto Read

on:
  schedule:
    # Cookie refresh: every 12 days at UTC 09:00 (Beijing 17:00)
    - cron: "0 0 */12 * *"
    # Daily read: every day at UTC 10:00 (Beijing 18:00)
    - cron: "0 10 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  # Job 1: Refresh cookies (runs first if triggered by schedule)
  refresh-cookies:
    if: github.event.schedule == '0 0 */12 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cookies: ${{ steps.refresh.outputs.cookies }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install curl_cffi
        run: pip install curl_cffi

      - name: Refresh cookies
        id: refresh
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: |
          python -c "
          import json, os, time
          from curl_cffi import requests

          accounts = json.loads(os.environ['ACCOUNTS_JSON'])
          cookies = []

          for acc in accounts:
              username = acc['username']
              password = acc['password']
              print(f'Processing {username}...')

              session = requests.Session(impersonate='chrome110')

              # Get main page
              r = session.get('https://linux.do/')
              print(f'  Main page: {r.status_code}')

              # Get CSRF
              r = session.get('https://linux.do/session/csrf.json', headers={
                  'Accept': 'application/json',
                  'X-Requested-With': 'XMLHttpRequest',
              })
              print(f'  CSRF: {r.status_code}')

              if r.status_code == 200:
                  csrf = json.loads(r.text).get('csrf', '')
                  # Login
                  r = session.post('https://linux.do/session',
                      data={'login': username, 'password': password},
                      headers={
                          'X-CSRF-Token': csrf,
                          'X-Requested-With': 'XMLHttpRequest',
                          'Accept': 'application/json',
                      }
                  )
                  print(f'  Login: {r.status_code}')

                  t_cookie = session.cookies.get('_t', '')
                  if t_cookie:
                      cookies.append(t_cookie)
                      print(f'  ✓ Got cookie')
                  else:
                      cookies.append('')
                      print(f'  ✗ No cookie')
              else:
                  cookies.append('')
                  print(f'  ✗ CSRF blocked')

              time.sleep(3)

          result = ','.join(cookies)
          print(f'COOKIES={result}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'cookies={result}\n')
          "

      - name: Update COOKIES secret
        if: steps.refresh.outputs.cookies != ''
        uses: hmanzur/actions-set-secret@v2.0.0
        with:
          name: 'COOKIES'
          value: ${{ steps.refresh.outputs.cookies }}
          repository: ${{ github.repository }}
          token: ${{ secrets.PAT_TOKEN }}

  # Job 2: Daily auto-read (runs every day)
  auto-read:
    if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    strategy:
      matrix:
        node-version: [20.x]

    env:
      USERNAMES: ${{ secrets.USERNAMES }}
      COOKIES: ${{ secrets.COOKIES }}
      WEBSITE: "https://linux.do"
      RUN_TIME_LIMIT_MINUTES: "25"
      MAX_CONCURRENT_ACCOUNTS: "3"
      AUTO_LIKE: "true"
      HIDE_ACCOUNT_INFO: "true"
      SPECIFIC_USER: "14790897"
      HEALTH_PORT: "7860"

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run auto read
        run: node bypasscf.js
