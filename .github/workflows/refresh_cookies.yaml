name: Refresh Cookies (every 12 days + manual)

on:
  schedule:
    # 每 12 天 UTC 09:00 运行 (北京时间 17:00)
    - cron: "0 0 */12 * *"
  workflow_dispatch: # 允许手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install curl_cffi
        run: pip install curl_cffi

      - name: Write refresh script
        run: |
          cat > /tmp/refresh_cookies.py << 'PYEOF'
          import json, os, time, sys
          from curl_cffi import requests

          accounts = json.loads(os.environ['ACCOUNTS_JSON'])
          cookies = []

          for acc in accounts:
              username = acc['username']
              password = acc['password']
              print(f'Processing {username}...', flush=True)

              success = False
              for attempt in range(3):
                  try:
                      session = requests.Session(impersonate='chrome124')

                      # Get main page first
                      r = session.get('https://linux.do/')
                      print(f'  Main page: {r.status_code}', flush=True)
                      time.sleep(2)

                      # Get CSRF
                      r = session.get('https://linux.do/session/csrf.json', headers={
                          'Accept': 'application/json',
                          'X-Requested-With': 'XMLHttpRequest',
                      })
                      print(f'  CSRF: {r.status_code}', flush=True)

                      if r.status_code == 429:
                          print(f'  Rate limited, waiting 10s...', flush=True)
                          time.sleep(10)
                          continue

                      if r.status_code == 200:
                          csrf = json.loads(r.text).get('csrf', '')
                          time.sleep(1)

                          # Login
                          r = session.post('https://linux.do/session',
                              data={'login': username, 'password': password},
                              headers={
                                  'X-CSRF-Token': csrf,
                                  'X-Requested-With': 'XMLHttpRequest',
                                  'Accept': 'application/json',
                              }
                          )
                          print(f'  Login: {r.status_code}', flush=True)

                          t_cookie = session.cookies.get('_t', '')
                          if t_cookie:
                              cookies.append(t_cookie)
                              print(f'  [OK] Got cookie', flush=True)
                              success = True
                              break
                          else:
                              print(f'  [FAIL] No _t cookie in response', flush=True)
                      else:
                          print(f'  [FAIL] CSRF blocked', flush=True)

                      time.sleep(5)
                  except Exception as e:
                      print(f'  [ERROR] {e}', flush=True)
                      time.sleep(5)

              if not success:
                  cookies.append('')
                  print(f'  [FAIL] All attempts failed', flush=True)

              time.sleep(3)

          result = ','.join(cookies)
          print(f'', flush=True)
          print(f'COOKIES={result}', flush=True)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'cookies={result}\n')
          PYEOF

      - name: Refresh cookies
        id: refresh
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: python /tmp/refresh_cookies.py

      - name: Show results
        if: always()
        run: |
          echo "=========================================="
          echo "NEW COOKIES VALUE:"
          echo "${{ steps.refresh.outputs.cookies }}"
          echo "=========================================="

      - name: Auto-update COOKIES secret
        if: steps.refresh.outputs.cookies != '' && !contains(steps.refresh.outputs.cookies, ',,')
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh secret set COOKIES --body "${{ steps.refresh.outputs.cookies }}" --repo ${{ github.repository }}
          echo "COOKIES secret updated automatically!"
